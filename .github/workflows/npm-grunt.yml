name: NodeJS with Grunt

on:
  push:
    branches:
      - "feature/**"
      - "main"
  pull_request:
    branches:
      - "feature/**"
      - "main"

jobs:
  
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.3
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker container
        run: docker run -d -p 3000:80 ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      - name: Wait for container to be ready
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:3000 && echo "Container ready" && exit 0
            echo "Waiting... ($i/10)"
            sleep 3
          done
          echo "Container failed to start" && exit 1